name: Build profile README

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "profile.json"
      - "ascii/**"
      - "build_profile.py"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build light and dark profile cards
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: python build_profile.py

      - name: Commit refreshed cards
        run: |
          if git diff --quiet -- dark_mode.svg light_mode.svg; then
            echo "No profile changes to commit."
            exit 0
          fi
          git config user.name "Nebulazer123 Profile Bot"
          git config user.email "nebulazer2003@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git commit -m "Update profile card"
          git push
