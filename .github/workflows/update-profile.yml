name: Update profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
  push:
    branches:
      - main
    paths:
      - "portrait_light.txt"
      - "today.py"
      - "README.md"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build light profile and refresh GitHub statistics
        run: python today.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit generated light card
        run: |
          if [[ -n "$(git status --porcelain light_mode.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add light_mode.svg
            git commit -m "Update light profile card"
            git push
          fi
